name: Sync Notion to Calendar

on:
  schedule:
    # Runs weekly on Every 06:00 UTC (00:00 KST)
    - cron: "0 15 * * *"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run notion2cal
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: python notion2cal.py

      - name: Commit and push .ics file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add notion_calendar.ics
          git diff --cached --quiet || git commit -m "Update calendar $(date -u +%Y-%m-%d)"
          git push
